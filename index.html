<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<!-- PWA — Add to Home Screen on iPhone -->
<meta name="apple-mobile-web-app-title" content="Flashback">
<link rel="apple-touch-icon" href="https://yourusername.github.io/flashback/icon.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FFF8F0;
    --surface: #FFFFFF;
    --surface2: #FFF2E4;
    --border: rgba(0,0,0,0.07);
    --border2: rgba(0,0,0,0.12);
    --text: #1A1208;
    --text2: #7A6A55;
    --text3: #B8A898;
    --accent: #FF6B2B;
    --accent-light: #FFF0E8;
    --green: #22C07A;
    --green-light: #E8FAF2;
    --red: #F03E3E;
    --red-light: #FEF0F0;
    --blue: #4A90E2;
    --yellow: #F5A623;
    --yellow-light: #FFF8E8;
    --radius: 20px;
    --radius-sm: 14px;
    --radius-xs: 10px;
    --shadow: 0 2px 12px rgba(0,0,0,0.06);
    --shadow-md: 0 4px 20px rgba(0,0,0,0.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    overflow: hidden;
    user-select: none;
  }

  #app {
    height: 100vh;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    max-width: 420px;
    margin: 0 auto;
    position: relative;
  }

  .screen {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 18px 32px;
    overflow-y: auto;
  }
  .screen::-webkit-scrollbar { display: none; }

  /* ── LOGO ── */
  .logo {
    font-size: 26px;
    font-weight: 900;
    letter-spacing: -0.5px;
    margin-top: 48px;
    margin-bottom: 2px;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .logo-flash { color: var(--text); }
  .logo-back { color: var(--accent); }
  .logo-bolt {
    background: var(--accent);
    color: white;
    font-size: 14px;
    width: 26px;
    height: 26px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-left: 2px;
  }

  .tagline {
    font-size: 12px;
    color: var(--text3);
    font-weight: 600;
    letter-spacing: 0.5px;
    margin-bottom: 20px;
  }

  /* ── STATS ── */
  .stats-row {
    display: flex;
    gap: 10px;
    width: 100%;
    margin-bottom: 18px;
  }
  .stat-card {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 10px;
    text-align: center;
    box-shadow: var(--shadow);
  }
  .stat-val {
    font-size: 22px;
    font-weight: 900;
    color: var(--text);
    line-height: 1;
  }
  .stat-val.streak { color: var(--yellow); }
  .stat-val.best { color: var(--green); }
  .stat-lbl {
    font-size: 10px;
    color: var(--text3);
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-top: 3px;
  }

  /* ── STAGE ── */
  .stage {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 190px;
    padding: 24px;
    margin-bottom: 14px;
    box-shadow: var(--shadow);
  }

  .flash-emoji {
    font-size: 96px;
    line-height: 1;
    transition: opacity 0.12s ease;
  }
  .flash-label {
    font-size: 15px;
    font-weight: 700;
    color: var(--text2);
    margin-top: 10px;
  }
  .flash-counter {
    font-size: 11px;
    color: var(--text3);
    font-weight: 600;
    margin-top: 4px;
  }

  /* ── TIMER BAR ── */
  .timer-wrap {
    width: 100%;
    height: 5px;
    background: var(--surface2);
    border-radius: 3px;
    margin-bottom: 14px;
    overflow: hidden;
  }
  .timer-fill {
    height: 5px;
    background: var(--accent);
    border-radius: 3px;
    width: 100%;
  }

  /* ── LEVEL BADGE ── */
  .level-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
  }
  .lvl-badge {
    font-size: 12px;
    font-weight: 800;
    color: var(--text2);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 14px;
    box-shadow: var(--shadow);
  }
  .life-badge {
    font-size: 12px;
    font-weight: 800;
    color: var(--yellow);
    background: var(--yellow-light);
    border: 1px solid rgba(245,166,35,0.2);
    border-radius: 20px;
    padding: 5px 12px;
    display: none;
  }
  .life-badge.show { display: block; }

  /* ── SEQUENCE PREVIEW ── */
  .seq-preview {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: center;
    min-height: 48px;
    align-items: center;
    margin-bottom: 14px;
    width: 100%;
  }
  .seq-slot {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    border: 1.5px solid var(--border2);
    background: var(--surface);
    transition: all 0.2s;
    box-shadow: var(--shadow);
  }
  .seq-slot.filled {
    border-color: var(--green);
    background: var(--green-light);
  }
  .seq-slot.pending {
    opacity: 0.3;
    box-shadow: none;
  }
  .seq-slot.next {
    border-color: var(--accent);
    background: var(--accent-light);
    animation: breathe 1.2s ease-in-out infinite;
  }
  @keyframes breathe {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.06); }
  }

  /* ── PIPS ── */
  .pips-row {
    display: flex;
    gap: 5px;
    margin-bottom: 16px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .pip {
    width: 20px;
    height: 5px;
    border-radius: 3px;
    background: var(--border2);
    transition: background 0.2s;
  }
  .pip.done { background: var(--green); }
  .pip.now { background: var(--accent); }

  /* ── CHOICES ── */
  .choices {
    width: 100%;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 14px;
  }
  .choice {
    background: var(--surface);
    border: 1.5px solid var(--border2);
    border-radius: var(--radius-sm);
    padding: 18px 8px 14px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    transition: transform 0.12s, border-color 0.15s, background 0.15s, box-shadow 0.15s;
    box-shadow: var(--shadow);
    position: relative;
    overflow: hidden;
  }
  .choice:active { transform: scale(0.95); box-shadow: none; }
  .choice-emoji { font-size: 44px; line-height: 1; }
  .choice-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--text2);
    letter-spacing: 0.2px;
  }
  .choice.correct {
    border-color: var(--green) !important;
    background: var(--green-light) !important;
    box-shadow: 0 0 0 3px rgba(34,192,122,0.15) !important;
  }
  .choice.wrong {
    border-color: var(--red) !important;
    background: var(--red-light) !important;
    box-shadow: 0 0 0 3px rgba(240,62,62,0.15) !important;
  }
  .choice.disabled { pointer-events: none; opacity: 0.35; box-shadow: none; }
  .choice.disabled.correct,
  .choice.disabled.wrong { opacity: 1; }

  /* ── BUTTONS ── */
  .btn-primary {
    width: 100%;
    padding: 17px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    font-family: 'Nunito', sans-serif;
    font-size: 16px;
    font-weight: 800;
    cursor: pointer;
    margin-bottom: 10px;
    box-shadow: 0 4px 14px rgba(255,107,43,0.35);
    transition: opacity 0.15s, transform 0.1s;
    letter-spacing: 0.2px;
  }
  .btn-primary:active { opacity: 0.88; transform: scale(0.98); box-shadow: none; }

  .btn-ghost {
    width: 100%;
    padding: 14px;
    background: var(--surface);
    color: var(--text2);
    border: 1.5px solid var(--border2);
    border-radius: var(--radius-sm);
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .btn-ghost:active { border-color: var(--accent); color: var(--accent); }

  /* ── RESULT ── */
  .result-big {
    font-size: 80px;
    font-weight: 900;
    color: var(--text);
    line-height: 1;
    margin: 8px 0 2px;
  }
  .result-sub {
    font-size: 13px;
    color: var(--text3);
    font-weight: 600;
    margin-bottom: 16px;
  }
  .share-box {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: var(--radius-xs);
    padding: 14px 16px;
    font-family: monospace;
    font-size: 13px;
    color: var(--text2);
    line-height: 1.75;
    white-space: pre-wrap;
    margin-bottom: 18px;
    text-align: left;
  }

  /* ── LEVEL UP ── */
  .levelup-ring {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    background: var(--green-light);
    border: 3px solid var(--green);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 44px;
    margin-bottom: 14px;
  }

  /* ── LIFELINE ── */
  .life-panel {
    width: 100%;
    background: var(--yellow-light);
    border: 1.5px solid rgba(245,166,35,0.3);
    border-radius: var(--radius);
    padding: 24px;
    text-align: center;
    margin-bottom: 16px;
  }
  .life-icon { font-size: 44px; margin-bottom: 10px; }
  .life-title {
    font-size: 20px;
    font-weight: 900;
    color: #9A6C00;
    margin-bottom: 6px;
  }
  .life-desc { font-size: 13px; color: #7A5500; font-weight: 600; line-height: 1.6; }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .fadein { animation: fadeUp 0.28s ease forwards; }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-7px); }
    40% { transform: translateX(7px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
  }
  .shake { animation: shake 0.38s ease; }

  @keyframes pop {
    0% { transform: scale(1); }
    45% { transform: scale(1.14); }
    100% { transform: scale(1); }
  }
  .pop { animation: pop 0.22s ease; }

  /* ── CONFETTI dots ── */
  .confetti-wrap {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none;
    overflow: hidden;
    z-index: 10;
  }
  .dot {
    position: absolute;
    width: 8px; height: 8px;
    border-radius: 50%;
    animation: fall 1.1s ease-in forwards;
  }
  @keyframes fall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(200px) rotate(360deg); opacity: 0; }
  }
</style>
</head>
<body>
<div id="app">
  <div class="screen" id="screen"></div>
</div>

<script>
const IMAGES = [
  { e:'🏖️', l:'Beach' }, { e:'🍕', l:'Pizza' }, { e:'💵', l:'Dollar' },
  { e:'🌵', l:'Cactus' }, { e:'🚀', l:'Rocket' }, { e:'🐧', l:'Penguin' },
  { e:'🗼', l:'Tower' }, { e:'🍣', l:'Sushi' }, { e:'🎸', l:'Guitar' },
  { e:'🌋', l:'Volcano' }, { e:'🦩', l:'Flamingo' }, { e:'🍩', l:'Donut' },
  { e:'🏆', l:'Trophy' }, { e:'🎃', l:'Pumpkin' }, { e:'🦋', l:'Butterfly' },
  { e:'💎', l:'Diamond' }, { e:'🌈', l:'Rainbow' }, { e:'🎯', l:'Target' },
  { e:'🦁', l:'Lion' }, { e:'🍦', l:'Ice Cream' }, { e:'🏄', l:'Surfer' },
  { e:'🦄', l:'Unicorn' }, { e:'🌺', l:'Flower' }, { e:'🎺', l:'Trumpet' },
];

const FLASH_MS = 2000;
const BLANK_MS = 200;
const MAX_LEVEL = 20;
const CONFETTI_COLORS = ['#FF6B2B','#22C07A','#F5A623','#4A90E2','#F03E3E','#9B59B6'];

function seededRand(s) {
  return () => { s = (s * 16807) % 2147483647; return (s-1)/2147483646; };
}
const today = new Date();
const dayStr = today.toLocaleDateString('en-US',{month:'short',day:'numeric'});
const seed = today.getFullYear()*10000 + (today.getMonth()+1)*100 + today.getDate();
const DAILY = [...IMAGES].sort(() => seededRand(seed)() - 0.5).slice(0, MAX_LEVEL);

// Storage
function store() { try { return JSON.parse(localStorage.getItem('fb_v2')||'{}'); } catch { return {}; } }
function save(d) { try { localStorage.setItem('fb_v2', JSON.stringify(d)); } catch {} }
function getStreak() {
  const s = store();
  if (!s.lastDate) return 0;
  const yest = new Date(today); yest.setDate(yest.getDate()-1);
  const yStr = yest.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  if (s.lastDate === dayStr || s.lastDate === yStr) return s.streak || 0;
  return 0;
}
function recordPlay(lvl) {
  const s = store();
  const yest = new Date(today); yest.setDate(yest.getDate()-1);
  const yStr = yest.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  let streak = s.streak || 0;
  if (s.lastDate === yStr) streak += 1;
  else if (s.lastDate !== dayStr) streak = 1;
  const highScore = Math.max(s.highScore||0, lvl);
  save({ streak, highScore, lastDate: dayStr });
  return { streak, highScore };
}

const S = document.getElementById('screen');
let level=3, maxCleared=0, lifeUsed=0, failedAt=null;

function lifeMax(l) { return l>=20?2:l>=10?1:0; }

function logoHTML() {
  return `<div class="logo"><span class="logo-flash">flash</span><span class="logo-back">back</span><div class="logo-bolt">⚡</div></div>`;
}

function statsHTML() {
  const streak = getStreak(), best = store().highScore||0;
  return `<div class="stats-row">
    <div class="stat-card"><div class="stat-val streak">${streak>0?'🔥':'—'}&nbsp;${streak}</div><div class="stat-lbl">Day Streak</div></div>
    <div class="stat-card"><div class="stat-val best">${best||'—'}</div><div class="stat-lbl">High Score</div></div>
  </div>`;
}

function confetti() {
  const wrap = document.createElement('div');
  wrap.className = 'confetti-wrap';
  document.getElementById('app').appendChild(wrap);
  for (let i=0;i<28;i++) {
    const d = document.createElement('div');
    d.className = 'dot';
    d.style.cssText = `left:${Math.random()*100}%;top:0;background:${CONFETTI_COLORS[Math.floor(Math.random()*CONFETTI_COLORS.length)]};animation-delay:${Math.random()*0.5}s;animation-duration:${0.8+Math.random()*0.5}s;`;
    wrap.appendChild(d);
  }
  setTimeout(()=>wrap.remove(), 1600);
}

// ─ Screens ─

function showStart() {
  level=3; maxCleared=0; lifeUsed=0; failedAt=null;
  S.innerHTML = `
    ${logoHTML()}
    <div class="tagline">${dayStr} · Daily Memory Game</div>
    ${statsHTML()}
    <div class="stage fadein" style="min-height:170px;">
      <div style="font-size:58px;margin-bottom:12px;">🧠</div>
      <div style="font-size:16px;font-weight:800;margin-bottom:6px;color:var(--text)">Remember the sequence</div>
      <div style="font-size:13px;color:var(--text2);font-weight:600;text-align:center;line-height:1.6;">Images flash one by one.<br>Tap them back in order.</div>
    </div>
    <div style="display:flex;gap:10px;width:100%;margin-bottom:18px;">
      <div class="stat-card"><div class="stat-val" style="font-size:18px">3</div><div class="stat-lbl">Start</div></div>
      <div class="stat-card"><div class="stat-val" style="font-size:18px">2s</div><div class="stat-lbl">Flash</div></div>
      <div class="stat-card"><div class="stat-val" style="font-size:18px">${MAX_LEVEL}</div><div class="stat-lbl">Max</div></div>
    </div>
    <button class="btn-primary" onclick="startLevel()">Play Today's Flashback ⚡</button>
  `;
}

function startLevel() {
  showFlash(0);
}

function showFlash(idx) {
  const seq = DAILY.slice(0, level);
  const item = seq[idx];
  S.innerHTML = `
    ${logoHTML()}
    <div class="level-row"><div class="lvl-badge">Level ${level} · ${idx+1} of ${level}</div></div>
    <div class="stage">
      <div class="flash-emoji" id="fe">${item.e}</div>
      <div class="flash-label">${item.l}</div>
      <div class="flash-counter">${idx+1} / ${level}</div>
    </div>
    <div class="timer-wrap"><div class="timer-fill" id="tb"></div></div>
    <div style="font-size:12px;color:var(--text3);font-weight:700;text-align:center;letter-spacing:0.5px;text-transform:uppercase;">Watch carefully</div>
  `;
  const tb = document.getElementById('tb');
  tb.style.transition='none'; tb.style.width='100%';
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    tb.style.transition=`width ${FLASH_MS}ms linear`; tb.style.width='0%';
  }));
  setTimeout(()=>{
    const fe=document.getElementById('fe'); if(fe) fe.style.opacity='0';
    setTimeout(()=>{
      if(idx+1<level) showFlash(idx+1); else showRecall();
    }, BLANK_MS);
  }, FLASH_MS);
}

function showRecall() {
  const seq = DAILY.slice(0, level);
  let answerIdx = 0;

  function buildPool() {
    const correct = seq[answerIdx];
    // Decoys from within the sequence (harder — you've seen them all)
    const decoys = seq.filter((_,i)=>i!==answerIdx).sort(()=>Math.random()-0.5).slice(0,3);
    if (decoys.length<3) {
      const seqSet = new Set(seq.map(i=>i.e));
      const extra = IMAGES.filter(i=>!seqSet.has(i.e)).sort(()=>Math.random()-0.5);
      while(decoys.length<3 && extra.length) decoys.push(extra.shift());
    }
    return [correct,...decoys].sort(()=>Math.random()-0.5);
  }

  function draw() {
    const pool = buildPool();
    const lifeAvail = lifeMax(level) - lifeUsed;

    const slotsHTML = seq.map((img,i)=>{
      if(i<answerIdx) return `<div class="seq-slot filled">${img.e}</div>`;
      if(i===answerIdx) return `<div class="seq-slot next">·</div>`;
      return `<div class="seq-slot pending">·</div>`;
    }).join('');

    const pipsHTML = seq.map((_,i)=>{
      let c='pip'; if(i<answerIdx) c+=' done'; else if(i===answerIdx) c+=' now';
      return `<div class="${c}"></div>`;
    }).join('');

    const choicesHTML = pool.map(img=>`
      <div class="choice" data-emoji="${img.e}">
        <div class="choice-emoji">${img.e}</div>
        <div class="choice-label">${img.l}</div>
      </div>`).join('');

    S.innerHTML = `
      ${logoHTML()}
      <div class="level-row">
        <div class="lvl-badge">Level ${level} · pick #${answerIdx+1}</div>
        <div class="life-badge ${lifeAvail>0?'show':''}">🛡️ ${lifeAvail} life</div>
      </div>
      <div class="seq-preview">${slotsHTML}</div>
      <div class="pips-row">${pipsHTML}</div>
      <div class="choices">${choicesHTML}</div>
    `;

    S.querySelectorAll('.choice').forEach(btn=>{
      btn.addEventListener('click',()=>{
        const chosen = btn.getAttribute('data-emoji');
        const correct = seq[answerIdx].e;

        if(chosen===correct) {
          btn.classList.add('pop');
          answerIdx++;
          if(answerIdx===seq.length) {
            maxCleared=level; level++;
            confetti();
            setTimeout(showLevelUp, 350);
          } else { setTimeout(draw, 160); }
        } else {
          S.querySelectorAll('.choice').forEach(b=>{
            b.classList.add('disabled');
            if(b.getAttribute('data-emoji')===correct) b.classList.add('correct');
          });
          btn.classList.remove('disabled'); btn.classList.add('wrong'); btn.classList.add('shake');
          if(!failedAt) failedAt=level;
          if(lifeMax(level)-lifeUsed>0) {
            lifeUsed++;
            setTimeout(()=>showLifeline(correct), 1200);
          } else { setTimeout(showResult, 1400); }
        }
      });
    });
  }
  draw();
}

function showLifeline(correctEmoji) {
  const rem = lifeMax(level)-lifeUsed;
  S.innerHTML = `
    ${logoHTML()}
    <div class="level-row"><div class="lvl-badge">Level ${level}</div></div>
    <div class="life-panel fadein">
      <div class="life-icon">🛡️</div>
      <div class="life-title">Lifeline saved you!</div>
      <div class="life-desc">The right answer was <strong>${correctEmoji}</strong><br>${rem} lifeline${rem!==1?'s':''} left · Level restarts</div>
    </div>
    <button class="btn-primary" onclick="startLevel()">Try level ${level} again ↺</button>
    <button class="btn-ghost" onclick="showResult()">End game &amp; see score</button>
  `;
}

function showLevelUp() {
  const newLife = lifeMax(level)-lifeMax(level-1);
  const lifeMsg = newLife>0 ? `<div style="background:var(--yellow-light);border:1.5px solid rgba(245,166,35,0.3);border-radius:10px;padding:10px 16px;margin-bottom:16px;font-size:13px;font-weight:700;color:#9A6C00;">🛡️ +${newLife} lifeline unlocked!</div>` : '';
  S.innerHTML = `
    ${logoHTML()}
    <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding-top:16px;width:100%;">
      <div class="levelup-ring fadein">✅</div>
      <div style="font-size:24px;font-weight:900;margin-bottom:4px;">Level ${level-1} cleared!</div>
      <div style="font-size:14px;color:var(--text2);font-weight:700;margin-bottom:20px;">${level} images next</div>
      ${lifeMsg}
    </div>
    <button class="btn-primary" onclick="startLevel()">Level ${level} — Let's go! →</button>
    <button class="btn-ghost" onclick="showResult()">Stop &amp; see my score</button>
  `;
}

function showResult() {
  const reached = maxCleared>0 ? maxCleared : level-1;
  const {streak, highScore} = recordPlay(reached);
  const isNew = reached>=highScore;

  let pipsStr='';
  for(let i=3;i<=Math.max(reached,3);i++) pipsStr += i<=reached?'🟧':'⬜';

  const shareText = `⚡ Flashback ${dayStr}\n🧠 Level ${reached}${isNew?' 🏆':''}\n${pipsStr}\nplayflashback.com`;

  S.innerHTML = `
    ${logoHTML()}
    <div style="width:100%;text-align:center;margin-top:8px;">
      ${isNew?`<div style="font-size:11px;font-weight:800;color:var(--yellow);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;">🏆 New High Score!</div>`:''}
      <div class="result-big fadein">${reached}</div>
      <div class="result-sub">level reached · ${failedAt?'lost at level '+failedAt:'stopped here'}</div>
    </div>
    <div style="display:flex;gap:10px;width:100%;margin-bottom:18px;">
      <div class="stat-card"><div class="stat-val streak">🔥 ${streak}</div><div class="stat-lbl">Day Streak</div></div>
      <div class="stat-card"><div class="stat-val best">${highScore}</div><div class="stat-lbl">High Score</div></div>
    </div>
    <div class="share-box">${shareText}</div>
    <button class="btn-primary" id="shareBtn">Copy &amp; Share Result 📋</button>
    <button class="btn-ghost" style="margin-top:10px;" onclick="showStart()">Play Again</button>
  `;

  document.getElementById('shareBtn').addEventListener('click',()=>{
    navigator.clipboard.writeText(shareText).then(()=>{
      const b=document.getElementById('shareBtn');
      b.textContent='Copied! ✓'; b.style.background='var(--green)';
      setTimeout(()=>{ b.textContent='Copy & Share Result 📋'; b.style.background=''; },2000);
    }).catch(()=>{
      const ta=document.createElement('textarea'); ta.value=shareText;
      document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
      const b=document.getElementById('shareBtn'); b.textContent='Copied! ✓';
      setTimeout(()=>{ b.textContent='Copy & Share Result 📋'; },2000);
    });
  });
}

window.showStart=showStart; window.showResult=showResult;
window.startLevel=startLevel; window.showLevelUp=showLevelUp;

showStart();
</script>
</body>
</html>
